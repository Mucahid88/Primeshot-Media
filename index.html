  .sub { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }

  .grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }

  label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 4px; }
  select, input[type=text] { width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); }

  .stats5 { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-bottom: 1.5rem; }

  .sl { font-size: 10px; color: var(--text2); margin-top: 2px; line-height: 1.3; }

  .sec { display: none; } .sec.on { display: block; }

  .cname { font-size: 15px; font-weight: 600; }
  .badges { display: flex; gap: 4px; flex-wrap: wrap; }
  .b { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
  .bh { background: var(--green-bg); color: var(--green-text); }
  .bw { background: var(--orange-bg); color: var(--orange-text); }
  .bt { background: var(--bg2); color: var(--text2); }
  .bnv { background: var(--orange-bg); color: var(--orange-text); }
  .igrid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 12px; margin: 8px 0; }
  .irow { display: flex; align-items: flex-start; gap: 4px; font-size: 11px; padding: 3px 0; border-bottom: 1px solid var(--border2); }
  .ilbl { color: var(--text2); min-width: 65px; font-size: 10px; }
  .ival { color: var(--text); word-break: break-all; }
  .ival a { color: var(--blue); text-decoration: none; }
  .rbox { font-size: 11px; color: var(--text2); font-style: italic; padding: 6px 9px; border-left: 2px solid var(--border); background: var(--bg2); border-radius: 0 var(--radius) var(--radius) 0; margin: 7px 0; }
  .prow { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; }
  .pval { font-size: 12px; font-weight: 600; color: var(--green-text); }
  .prov { font-size: 11px; color: var(--text2); background: var(--bg2); padding: 2px 8px; border-radius: 20px; }

  .bs { font-size: 11px; padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 3px; }
  .bs:hover { background: var(--bg2); }
  .stbtn { font-size: 10px; padding: 3px 9px; border-radius: 20px; cursor: pointer; border: none; font-weight: 600; }

  .s1 { background: var(--blue-bg); color: var(--blue-text); }
  .s2 { background: var(--purple-bg); color: var(--purple-text); }
  .s3 { background: var(--green-bg); color: var(--green-text); }

  .pfill { height: 100%; background: var(--text); border-radius: 4px; transition: width .35s; }
  .ptxt { font-size: 12px; color: var(--text2); margin-bottom: 3px; }
  .overlay { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,.5); z-index: 100; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .mbox { background: var(--bg); border-radius: var(--radius-lg); padding: 20px; max-width: 540px; width: 95%; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }

  event:l=>`Event filming til ${l.n} – PrimeShot Media`,
  corporate:l=>`Professionel virksomhedsfilm til ${l.n} – PrimeShot Media`
};

let leads=[],pipeline={},curMail=null,mailMap={};

function go(){
  const ni=document.getElementById("ni").value;
  const ct=parseInt(document.getElementById("ct").value)||50;
  const sort=document.getElementById("sort").value;
  const noreklame=document.getElementById("noreklame").value==="1";
  const omsa=parseInt(document.getElementById("omsa").value)||0;
  document.getElementById("goBtn").disabled=true;
  document.getElementById("pw").style.display="block";
  document.getElementById("sw").style.display="none";
  document.getElementById("mw").style.display="none";
  let pool=ni==="alle"?[...FULL]:FULL.filter(x=>x.ni===ni);
  if(noreklame) pool=pool.filter(x=>x.ir);
  if(omsa>0) pool=pool.filter(x=>x.omsa>=omsa);
  if(sort==="pris") pool.sort((a,b)=>b.p-a.p);
  else if(sort==="hot") pool.sort((a,b)=>(b.pr==="hot"?1:0)-(a.pr==="hot"?1:0)||b.p-a.p);
  else pool.sort((a,b)=>a.n.localeCompare(b.n));
  leads=pool.slice(0,ct);
  leads.forEach(l=>{if(!pipeline[l.n])pipeline[l.n]=0;});
  const steps=["Scanner "+FULL.length+" virksomheder...","Filtrerer virksomheder uden reklamevideoer...","Henter adresser og kontaktinfo...","Analyserer omsætning og betalingsevne...","Klargør salgsmails til Mucahid..."];
  let i=0;
  const iv=setInterval(()=>{
    if(i>=steps.length){clearInterval(iv);document.getElementById("pf").style.width="100%";setTimeout(show,350);return;}
    document.getElementById("pt").textContent=steps[i];
    document.getElementById("pf").style.width=Math.round((i+1)/steps.length*100)+"%";
    i++;
  },500);
}

function filterSearch(){
  const q=document.getElementById("search").value.toLowerCase();
  renderLeads("tab-leads",q?leads.filter(l=>l.n.toLowerCase().includes(q)||l.ni.includes(q)||l.addr.toLowerCase().includes(q)):leads);
}

function show(){
  document.getElementById("pw").style.display="none";
  document.getElementById("sw").style.display="block";
  document.getElementById("mw").style.display="block";
  document.getElementById("goBtn").disabled=false;
  document.getElementById("s1").textContent=leads.length;
  document.getElementById("s2").textContent=leads.filter(l=>l.pr==="hot").length;
  document.getElementById("s3").textContent=leads.reduce((s,l)=>s+l.p,0).toLocaleString("da-DK")+" kr";
  document.getElementById("s4").textContent=(leads.length*150).toLocaleString("da-DK")+" kr";
  document.getElementById("s5").textContent=leads.filter(l=>(pipeline[l.n]||0)>0).length;
  renderLeads("tab-leads",leads);
  renderLeads("tab-hot",leads.filter(l=>l.pr==="hot"));
  renderMailList();
  renderPipeline();
  renderNotion();
}

function renderLeads(id,arr){
  const c=document.getElementById(id);
  if(!arr.length){c.innerHTML='<p style="color:#78716c;padding:1rem 0;font-size:13px">Ingen leads fundet med disse filtre.</p>';return;}
  c.innerHTML=arr.map(l=>{
    const ik=l.n.replace(/[^a-zA-Z0-9]/g,"_");
    mailMap[ik]=l;
    const si=pipeline[l.n]||0;
    return `<div class="card ${l.pr}">
      <div class="ctop">
        <div class="cname">${l.n}</div>
        <div class="badges">
          <span class="b ${l.pr==="hot"?"bh":"bw"}">${l.pr==="hot"?"🔥 Varmt":"Lunt"}</span>
          <span class="b bt">${l.t}</span>
          ${l.ir?'<span class="b bnv">Ingen reklame endnu</span>':""}
        </div>
      </div>
      <div class="igrid">
        <div class="irow"><span class="ilbl">📍 Adresse</span><span class="ival">${l.addr}</span></div>
        <div class="irow"><span class="ilbl">🌐 Web</span><span class="ival"><a href="https://${l.web}" target="_blank">${l.web}</a></span></div>
        <div class="irow"><span class="ilbl">✉️ Email</span><span class="ival" style="color:#185FA5">${l.email}</span></div>
        <div class="irow"><span class="ilbl">📞 Tlf</span><span class="ival">${l.tlf}</span></div>
        <div class="irow"><span class="ilbl">👤 Kontakt</span><span class="ival">${l.kontakt}</span></div>
        <div class="irow"><span class="ilbl">🏢 CVR</span><span class="ival">${l.cvr}</span></div>
        <div class="irow"><span class="ilbl">📈 Omsætning</span><span class="ival">${l.omsa}M+ kr/år</span></div>
        <div class="irow"><span class="ilbl">💰 Pakkepris</span><span class="ival" style="color:#085041;font-weight:600">${l.p.toLocaleString("da-DK")} kr</span></div>
      </div>
      <div class="rbox">${l.r}</div>
      <div class="acts">
        <button class="bs" onclick="openMail('${ik}')">✉️ Salgsmail</button>
        <button class="stbtn ${SC[si]}" id="stb_${ik}" onclick="cycleStatus('${l.n}','${ik}')">${ST[si]}</button>
      </div>
    </div>`;
  }).join("");
}

function renderMailList(){
  const c=document.getElementById("tab-mails");
  c.innerHTML='<p style="font-size:12px;color:#78716c;margin-bottom:10px">Ren tekst uden formatering. Klik for at åbne og kopiér direkte ind i din mail-app.</p>'+
  leads.map(l=>{
    const ik=l.n.replace(/[^a-zA-Z0-9]/g,"_");
    mailMap[ik]=l;
    return `<div onclick="openMail('${ik}')" style="display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border:1px solid #e7e5e4;border-radius:8px;margin-bottom:7px;cursor:pointer">
      <div><strong style="font-size:13px">${l.n}</strong> <span style="font-size:11px;color:#78716c;margin-left:7px">${l.t}</span><br><span style="font-size:11px;color:#185FA5">${l.email}</span></div>
      <span class="b ${l.pr==="hot"?"bh":"bw"}">${l.pr==="hot"?"🔥":"●"}</span>
    </div>`;
  }).join("");
}

function renderPipeline(){
  const c=document.getElementById("tab-pipe");
  const counts=[0,0,0,0,0];
  leads.forEach(l=>counts[pipeline[l.n]||0]++);
  c.innerHTML=`<div class="pipe-grid">${ST.map((s,i)=>`<div class="stat"><div class="sn">${counts[i]}</div><div class="sl">${s}</div></div>`).join("")}</div>
  <p style="font-size:11px;color:#78716c;margin-bottom:10px">Klik på status-knappen for at opdatere. Lukket salg = 150 kr i provision til Mucahid.</p>
  ${leads.map(l=>{
    const ik=l.n.replace(/[^a-zA-Z0-9]/g,"_");
    const si=pipeline[l.n]||0;
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border:1px solid #e7e5e4;border-radius:8px;margin-bottom:6px">
      <div><strong style="font-size:13px">${l.n}</strong> <span style="font-size:11px;color:#78716c">${l.t}</span></div>
      <button class="stbtn ${SC[si]}" id="stb_${ik}" onclick="cycleStatus('${l.n}','${ik}')">${ST[si]}</button>
    </div>`;
  }).join("")}`;
}

function renderNotion(){
  const c=document.getElementById("tab-notion");
  c.innerHTML=`<div class="notion-box">
    <h3>📋 Sådan bruger du Notion som CRM til PrimeShot salg</h3>
    <strong>1. Opret en database i Notion med disse kolonner:</strong><br>
    <div class="notion-code">Virksomhed (Titel) | Status (Select) | Kontaktperson (Text)
Email (Email) | Telefon (Phone) | Adresse (Text)
Produkt (Select) | Pris (Number) | Dato kontaktet (Date)
Optagelsesdato (Date) | Provision (Number) | CVR (Text)
Noter fra samtale (Text) | Reaktion (Select) | Næste skridt (Text)</div>
    <strong>2. Status-farver i Notion:</strong><br>
    Ikke kontaktet (grå) → Kontaktet (blå) → Møde aftalt (lilla) → Lukket salg (grøn) → Afvist (rød)<br><br>
    <strong>3. Opret et nyt lead:</strong><br>
    Virksomhedsnavn → Vælg produkt → Udfyld kontaktinfo → Status "Ikke kontaktet" → Tilføj noter efter hvert opkald<br><br>
    <strong>4. Smarte Notion-views:</strong><br>
    Board View = se alle leads som kanban-kolonner<br>
    Filter: "Status = Kontaktet AND Dato = 3+ dage siden" = leads der trænger til follow-up<br>
    Skriv altid stemning fra samtalen i noter – giver bedre follow-up<br><br>
    <strong>5. Husk:</strong> Bookinger åbne fra 25. maj 2026 · Provision: 150 kr pr. lukket salg
  </div>`;
}

// PrimeShot Webhook – sender data til Netlify → Make → Notion
const PS_WEBHOOK = 'https://venerable-sorbet-f17a79.netlify.app/.netlify/functions/sales-webhook';

function sendToWebhook(type, detail, price) {
  const user = localStorage.getItem('ps_username') || 'Ukendt medarbejder';
  fetch(PS_WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      time: new Date().toISOString(),
      type: type,
      detail: detail,
      user: user,
      price: price || 0
    })
  }).catch(err => console.log('Webhook fejl:', err));
}

function openMail(ik){
  const l=mailMap[ik];
  if(!l)return;
  const body=(MAILS[l.tmpl]||MAILS.reklame)(l);
  const subj=(SUBJ[l.tmpl]||SUBJ.reklame)(l);
  curMail={subj,body};
  document.getElementById("mt").textContent="Salgsmail til "+l.n;
  document.getElementById("ms").textContent="Emne: "+subj;
  document.getElementById("mb").textContent=body;
  document.getElementById("modal").classList.add("open");
}

function closeM(){document.getElementById("modal").classList.remove("open");}

function copyMail(){
  if(!curMail)return;
  navigator.clipboard.writeText(curMail.body).then(()=>{
    const b=document.getElementById("cpBtn");
    b.textContent="✓ Kopieret!";
    setTimeout(()=>{b.textContent="📋 Kopiér mail";},2000);
  });
}

function cycleStatus(name,ik){
  pipeline[name]=((pipeline[name]||0)+1)%ST.length;
  const si=pipeline[name];
  document.querySelectorAll("#stb_"+ik).forEach(b=>{b.className="stbtn "+SC[si];b.textContent=ST[si];});
  document.getElementById("s5").textContent=leads.filter(l=>(pipeline[l.n]||0)>0).length;
  if(document.getElementById("tab-pipe").classList.contains("on"))renderPipeline();
  const erSalg = ST[si] === 'Lukket salg';
  const lead = leads.find(l=>l.n===name);
  const pris = lead ? (parseInt((lead.p||'').replace(/[^0-9]/g,''))||0) : 0;
  sendToWebhook(erSalg ? 'SALG' : 'PIPELINE', name + ' til ' + ST[si], pris);
}

function stab(n,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  document.querySelectorAll(".sec").forEach(s=>s.classList.remove("on"));
  el.classList.add("on");
  document.getElementById("tab-"+n).classList.add("on");
  if(n==="pipe")renderPipeline();
  if(n==="notion")renderNotion();
}
</script>
